<!DOCTYPE html>
<html lang="fr" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Inscription - Myaffilinks.io</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@200;300;400&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#1a3c4c',
            primaryDark: '#275a71',
            card: '#ffffff',
            input: '#f5f5f5',
            inputBorder: '#ddd',
          },
          aspectRatio: {
            'login-image': '634.5 / 729.9',
          },
          fontFamily: {
            nunito: ['Nunito', 'sans-serif'],
          }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-50 min-h-screen font-sans">

  <div class="flex min-h-screen">

    <!-- GAUCHE : Image + POURQUOI PAS TOI -->
    <div class="hidden lg:block lg:w-1/2 p-8 xl:p-14 bg-gray-50">
      <div class="h-[94vh] mx-auto max-w-[52vw] xl:max-w-[620px] mt-[-5vh] relative">   
        <div class="relative w-full h-full rounded-3xl overflow-hidden shadow-[0_30px_70px_-12px_rgba(0,0,0,0.55)] ring-1 ring-black/5 bg-white">
          <img 
            src="/images/signupimage.png" 
            alt="Motivation"
            class="absolute inset-0 w-full h-full object-cover">

          <!-- POURQUOI PAS TOI en blanc avec ombre renforcée -->
          <div class="absolute inset-0 flex items-start justify-center p-6 md:p-8 lg:p-10 xl:p-12 pointer-events-none">
            <h2 class="font-nunito font-light 
                       text-xl sm:text-2xl md:text-3xl lg:text-4xl xl:text-4xl
                       tracking-[0.04em] sm:tracking-[0.05em] md:tracking-[0.06em] lg:tracking-[0.08em] xl:tracking-[0.15em]
                       whitespace-nowrap
                       text-white leading-none"
                style="text-shadow: 
                  0 2px 4px rgba(0,0,0,0.6),
                  0 4px 8px rgba(0,0,0,0.5),
                  0 8px 16px rgba(0,0,0,0.4),
                  0 12px 24px rgba(0,0,0,0.3);">
              POURQUOI PAS TOI
            </h2>
          </div>
        </div>
      </div>
    </div>

    <!-- DROITE : Formulaire Inscription -->
    <div class="flex-1 flex items-center justify-center p-8">
      <div class="w-full max-w-md">
        <div class="text-center mb-10">
          <img src="/images/logobleucanardfoncé.svg" alt="Logo" class="mx-auto h-10 mb-4">
          <h1 class="text-3xl font-bold text-gray-900">Créer un compte</h1>
          <p class="mt-2 text-gray-600">Rejoins Myaffilinks.io</p>
        </div>

        <div id="error-message" class="hidden bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded-xl mb-6"></div>
        <div id="success-message" class="hidden bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded-xl mb-6"></div>

        <form id="signup-form" class="space-y-6">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
            <input type="email" id="email" required 
                   class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary">
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Nom d'utilisateur</label>
            <input type="text" id="username" required 
                   class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary">
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Mot de passe</label>
            <input type="password" id="password" required minlength="6"
                   class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary">
          </div>

          <button type="submit" 
                  class="w-full bg-primary hover:bg-primaryDark text-white font-semibold py-4 rounded-xl transition-all">
            Créer mon compte
          </button>
        </form>

        <div class="text-center mt-8">
          <a href="login.html" class="text-gray-500 hover:text-gray-700">← J'ai déjà un compte</a>
        </div>
      </div>
    </div>
  </div>

  <!-- Script (inchangé) -->
  <script type="module">
  import { supabase } from '/supabase/client.js'

  const form = document.getElementById('signup-form')
  const errorMsg = document.getElementById('error-message')
  const successMsg = document.getElementById('success-message')

  form.addEventListener('submit', async (e) => {
    e.preventDefault()

    const email = document.getElementById('email').value.trim()
    const username = document.getElementById('username').value.trim()
    const password = document.getElementById('password').value

    errorMsg.classList.add('hidden')
    successMsg.classList.add('hidden')

    try {
      const { error: authError } = await supabase.auth.signUp({
        email,
        password,
        options: {
          data: { username }
        }
      })

      if (authError) {
        errorMsg.textContent = authError.message
        errorMsg.classList.remove('hidden')
        return
      }

      successMsg.textContent = "✅ Compte créé ! Vérifie ton email pour confirmer."
      successMsg.classList.remove('hidden')

      setTimeout(() => { window.location.href = 'login.html' }, 2500)

    } catch (err) {
      errorMsg.textContent = "Erreur lors de l'inscription. Réessayez."
      errorMsg.classList.remove('hidden')
    }
  })
</script>

</body>
</html>
