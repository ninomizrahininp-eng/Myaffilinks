<!DOCTYPE html>
<html lang="fr" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Inscription - Myaffilinks.io</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@200;300;400&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#1a3c4c',
            primaryDark: '#275a71',
            card: '#ffffff',
            input: '#f5f5f5',
            inputBorder: '#ddd',
          },
          aspectRatio: {
            'login-image': '634.5 / 729.9',
          },
          fontFamily: {
            nunito: ['Nunito', 'sans-serif'],
          }
        }
      }
    }
  </script>
</head>

<body class="bg-white min-h-screen font-sans overflow-hidden text-gray-900">

  <div class="flex min-h-screen">

    <!-- GAUCHE : Image -->
    <div class="hidden lg:block lg:w-1/2 p-8 xl:p-14 bg-white">
      <div class="h-[94vh] mx-auto max-w-[52vw] xl:max-w-[620px] mt-[-5vh] relative">   
        <div class="relative w-full h-full rounded-3xl overflow-hidden shadow-[0_30px_70px_-12px_rgba(0,0,0,0.2)] ring-1 ring-gray-200 bg-white">

          <img 
            src="images/signupimage.png" 
            alt="Grande image motivation / travail / réussite"
            class="absolute inset-0 w-full h-full object-cover"
          />

          <div class="absolute inset-0 flex items-start justify-center p-6 md:p-8 lg:p-10 xl:p-12 pointer-events-none">
            <h2 class="font-nunito font-light 
                       text-xl sm:text-2xl md:text-3xl lg:text-4xl xl:text-4xl
                       tracking-[0.04em] sm:tracking-[0.05em] md:tracking-[0.06em] lg:tracking-[0.08em] xl:tracking-[0.15em]
                       whitespace-nowrap
                       text-white drop-shadow-[0_5px_12px_rgba(0,0,0,0.6)] leading-none"
                style="text-shadow: 
                  0 3px 6px rgba(0,0,0,0.5),
                  0 8px 16px rgba(0,0,0,0.35),
                  0 16px 32px rgba(0,0,0,0.25);">
              POURQUOI PAS TOI
            </h2>
          </div>

        </div>
      </div>
    </div>

    <!-- DROITE : Formulaire -->
    <div class="w-full lg:w-1/2 flex items-center justify-center p-6 md:p-10 lg:p-12 bg-white">

      <div class="w-full max-w-md space-y-8">

        <div class="text-center pt-1">
          <img 
            src="images/logobleucanardfoncé.svg" 
            alt="Myaffilinks Logo" 
            class="mx-auto block h-8 md:h-10 w-auto mb-3"
          />
          <br /><br /><br />
        </div>

        <div class="text-center">
          <h1 class="text-3xl font-bold text-gray-900">S'inscrire</h1>
          <p class="mt-2 text-gray-500">Créez votre compte Myaffilinks</p>
        </div>

        <div class="flex justify-center">
          <button 
            onclick="alert('Connexion Google à venir')"  
            class="w-full flex items-center justify-center gap-3 bg-white border border-gray-300 text-gray-800 py-3.5 rounded-xl font-medium hover:bg-gray-50 transition-all duration-200 shadow-sm hover:shadow focus:outline-none focus:ring-2 focus:ring-primary/40"
          >
            <svg class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.51h5.84c-.25 1.31-.98 2.42-2.07 3.16v2.63h3.35c1.96-1.81 3.09-4.47 3.09-7.99z"/>
              <path d="M12 23c2.97 0 5.46-1.01 7.28-2.73l-3.35-2.63c-1.01.68-2.29 1.08-3.93 1.08-3.02 0-5.58-2.04-6.49-4.79H.96v2.67C2.77 20.39 6.62 23 12 23z"/>
              <path d="M5.51 14.21c-.23-.68-.36-1.41-.36-2.21s.13-1.53.36-2.21V7.34H.96C.35 8.85 0 10.39 0 12s.35 3.15.96 4.66l4.55-2.45z"/>
              <path d="M12 4.98c1.64 0 3.11.56 4.27 1.66l3.19-3.19C17.46 1.01 14.97 0 12 0 6.62 0 2.77 2.61.96 6.34l4.55 2.45C6.42 6.02 8.98 4.98 12 4.98z"/>
            </svg>
            Continuer avec Google
          </button>
        </div>

        <div class="relative my-5">
          <div class="absolute inset-0 flex items-center">
            <div class="w-full border-t border-gray-200"></div>
          </div>
          <div class="relative flex justify-center text-sm">
            <span class="px-4 bg-white text-gray-400">ou</span>
          </div>
        </div>

        <div class="flex justify-center">
          <a href="signupemail.html" 
             class="block w-full bg-primary text-white text-center py-4 rounded-xl font-semibold hover:bg-primaryDark transition-all duration-200 shadow-md hover:shadow-lg focus:outline-none focus:ring-2 focus:ring-primary/40">
            <span class="mr-2 text-xl">✉</span> Continuer avec l'e-mail
          </a>
        </div>

        <div class="text-center text-sm space-y-3 mt-6">
          <p class="text-gray-500">
            Déjà un compte ? 
            <a href="login.html" class="text-primary hover:text-primaryDark font-medium transition">Se connecter</a>
          </p>
          <a href="index.html" class="inline-block text-gray-400 hover:text-gray-600 transition">
            ← Retour à l'accueil
          </a>
        </div>

      </div>
    </div>

  </div>

</body>
</html>
