<script type="module">
  import { supabase } from '/supabase/client.js'

  const MEDALS = ['🥇', '🥈', '🥉']
  const PODIUM_HEIGHTS = ['h-24', 'h-32', 'h-20'] // 2nd, 1st, 3rd visually
  const PODIUM_ORDER   = [1, 0, 2] // display order: 2nd left, 1st center, 3rd right

  async function load() {
    const { data: { user: me } } = await supabase.auth.getUser()

    const { data: profiles, error } = await supabase
      .from('profiles')
      .select('user_id, username, avatar_url, plan, total_clicks, total_sales, total_revenue')
      .order('total_clicks', { ascending: false, nullsFirst: false })
      .limit(100)

    if (error || !profiles) {
      document.getElementById('leaderboard-rows').innerHTML =
        '<p class="text-center py-10 text-red-400 text-xs">Erreur lors du chargement.</p>'
      return
    }

    // Fill zeros for nulls and assign rank
    const ranked = profiles.map((p, i) => ({
      ...p,
      rank:          i + 1,
      total_clicks:  p.total_clicks  ?? 0,
      total_sales:   p.total_sales   ?? 0,
      total_revenue: p.total_revenue ?? 0,
      isMe:          me && p.user_id === me.id,
    }))

    renderPodium(ranked.slice(0, 3))
    renderRows(ranked, me)
  }

  // ── Avatar helper ─────────────────────────────────────────────────────────
  function avatarHTML(p, size = 'w-9 h-9', textSize = 'text-sm') {
    if (p.avatar_url) {
      return `<img src="${p.avatar_url}" alt="" class="${size} rounded-xl object-cover border border-white/10 shrink-0"/>`
    }
    const initial = (p.username || '?').charAt(0).toUpperCase()
    return `<div class="${size} rounded-xl bg-gradient-to-br from-orange-500/20 to-transparent border border-primary/20 flex items-center justify-center shrink-0">
              <span class="font-light text-primary ${textSize}">${initial}</span>
            </div>`
  }

  // ── Plan badge ────────────────────────────────────────────────────────────
  function planBadge(plan) {
    if (!plan || plan === 'free') return ''
    const colors = {
      starter:   'text-blue-400 bg-blue-400/10 border-blue-400/20',
      superieur: 'text-primary bg-primary/10 border-primary/20',
      ultime:    'text-yellow-400 bg-yellow-400/10 border-yellow-400/20',
    }
    return `<span class="text-[9px] uppercase tracking-widest px-2 py-0.5 rounded-full border ${colors[plan] || 'text-gray-400 border-gray-600'}">${plan}</span>`
  }

  // ── Podium (top 3) ────────────────────────────────────────────────────────
  function renderPodium(top3) {
    if (top3.length < 1) return
    const wrap = document.getElementById('podium')
    wrap.classList.remove('hidden')

    // Order: 2nd | 1st | 3rd
    const order = [top3[1], top3[0], top3[2]].filter(Boolean)
    const podiumRanks = [2, 1, 3]
    const podiumHeights = ['h-20', 'h-28', 'h-16']

    wrap.innerHTML = order.map((p, i) => {
      const rank = podiumRanks[i]
      const barH = podiumHeights[i]
      const highlight = rank === 1 ? 'border-primary/40 bg-primary/5' : 'border-white/5 bg-white/[0.02]'
      return `
        <div class="flex flex-col items-center gap-2 cursor-pointer group" onclick="openProfile('${p.user_id}')">
          ${avatarHTML(p, 'w-12 h-12', 'text-base')}
          <p class="text-xs font-light text-white truncate max-w-[80px] text-center">${p.username || '—'}</p>
          <p class="text-[10px] text-gray-500 num">${p.total_clicks.toLocaleString('fr-FR')}</p>
          <div class="${barH} w-full rounded-t-lg border ${highlight} flex items-end justify-center pb-2">
            <span class="text-lg">${MEDALS[rank - 1]}</span>
          </div>
        </div>`
    }).join('')
  }

  // ── Full table ────────────────────────────────────────────────────────────
  function renderRows(ranked, me) {
    const container = document.getElementById('leaderboard-rows')

    if (!ranked.length) {
      container.innerHTML = `<div class="text-center py-16 text-gray-600">
        <p class="text-3xl mb-3">👥</p>
        <p class="text-xs">Aucun membre pour l'instant.</p>
      </div>`
      return
    }

    container.innerHTML = ranked.map(p => {
      const isMe  = p.isMe
      const rowBg = isMe ? 'bg-primary/5 border-l-2 border-l-primary/50' : 'hover:bg-white/[0.02]'
      const rankDisplay = p.rank <= 3
        ? `<span class="text-base">${MEDALS[p.rank - 1]}</span>`
        : `<span class="text-xs text-gray-500 num">${p.rank}</span>`

      return `
        <div class="grid grid-cols-[40px_1fr_80px_80px_80px] gap-2 px-5 py-3.5 border-b border-white/[0.04] ${rowBg} cursor-pointer transition"
             onclick="openProfile('${p.user_id}')">
          <div class="flex items-center">${rankDisplay}</div>
          <div class="flex items-center gap-3 min-w-0">
            ${avatarHTML(p)}
            <div class="min-w-0">
              <div class="flex items-center gap-1.5 flex-wrap">
                <span class="text-xs font-light text-white truncate">${p.username || 'Utilisateur'}</span>
                ${isMe ? '<span class="text-[9px] text-primary/70 bg-primary/10 border border-primary/20 px-1.5 py-0.5 rounded-full">Vous</span>' : ''}
                ${planBadge(p.plan)}
              </div>
            </div>
          </div>
          <p class="text-xs text-gray-400 text-right self-center num">${p.total_clicks.toLocaleString('fr-FR')}</p>
          <p class="text-xs text-gray-400 text-right self-center num">${p.total_sales.toLocaleString('fr-FR')}</p>
          <p class="text-xs text-gray-400 text-right self-center num">${p.total_revenue > 0 ? p.total_revenue.toLocaleString('fr-FR') + ' €' : '—'}</p>
        </div>`
    }).join('')
  }

  // ── Navigate to public profile ────────────────────────────────────────────
  window.openProfile = (userId) => {
    const path = `/pagesvisit/profil-public.html?id=${userId}`
    if (window.spaLoadPage) window.spaLoadPage(path)
    else window.location.href = path
  }

  load()
</script>
